name: "AI Bootstrap (Figma × GitHub × AI)"
description: "Figma URL / AI thread URL / Acceptance Criteria を必須化"
title: "[AI] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        このIssueは「Figma × GitHub × AI」を連動させるための起点です。
        PRでは `Fixes #<issue>` / Figma URL / ACチェック済み（最低1つ）を必須にしてください。

  - type: input
    id: figma_url
    attributes:
      label: "Figma URL"
      description: "figma.com/design または figma.com/file"
      placeholder: "https://www.figma.com/design/..."
    validations:
      required: true

  - type: input
    id: ai_thread_url
    attributes:
      label: "AI thread URL"
      description: "ChatGPT / Gemini / Claude など、会話ログの参照URL（無ければ後で追記）"
      placeholder: "https://chatgpt.com/..."
    validations:
      required: true

  - type: textarea
    id: ai_thread_urls
    attributes:
      label: "AI thread URL(s)"
      description: "ChatGPT / Gemini / Claude など。複数可（1つ以上必須）"
      placeholder: |
        - https://chatgpt.com/...
        - https://gemini.google.com/...
        - https://claude.ai/...
    validations:
      required: true


