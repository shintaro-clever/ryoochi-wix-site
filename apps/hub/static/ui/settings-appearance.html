<!DOCTYPE html>
<html class="dark" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Orchestrator AI - 設定 / 外観</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#a55c50",
              "background-light": "#f7f6f6",
              "background-dark": "#1d1615",
              "border-dark": "#3d3432",
              "text-muted": "#b1a7a5",
              "card-dark": "#251f1e"
            },
            fontFamily: { display: ["Inter", "sans-serif"] },
            borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }
          }
        }
      };
    </script>

    <style>
      body { font-family: "Inter", "Noto Sans JP", sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(165, 92, 80, 0.2); border-radius: 10px; }
    </style>
  </head>

  <body data-page="settings" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display flex h-screen overflow-hidden">
    <div id="sidebar-root"></div>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
      <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
  <h2 class="text-xl font-bold"><span data-i18n="ui.settingsAppearance.title">設定 / 外観</span></h2>
  <a href="/ui/settings.html" class="text-xs text-primary hover:underline" data-i18n="ui.settingsAppearance.back">設定トップへ戻る</a>
</header>

      <div class="flex-1 overflow-y-auto custom-scrollbar bg-background-light dark:bg-background-dark p-8">
        <div class="max-w-4xl space-y-6 pb-16">
          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h1 class="text-xl font-bold" data-i18n="ui.settingsAppearance.h1">外観設定</h1>
            <p class="mt-2 text-sm text-slate-500 dark:text-slate-300" data-i18n="ui.settingsAppearance.desc">テーマとアクセント色を設定するUI骨格です。</p>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h2 class="text-lg font-bold" data-i18n="ui.settingsAppearance.section.theme">テーマ</h2>
            <div class="mt-3 grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
              <label class="flex items-center gap-2 p-4 rounded-lg border border-primary/10">
                <input type="radio" name="theme-mode" checked disabled />
                <span data-i18n="ui.settingsAppearance.theme.light">light</span>
              </label>
              <label class="flex items-center gap-2 p-4 rounded-lg border border-primary/10">
                <input type="radio" name="theme-mode" disabled />
                <span data-i18n="ui.settingsAppearance.theme.dark">dark</span>
              </label>
              <label class="flex items-center gap-2 p-4 rounded-lg border border-primary/10">
                <input type="radio" name="theme-mode" disabled />
                <span data-i18n="ui.settingsAppearance.theme.system">system</span>
              </label>
            </div>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h2 class="text-lg font-bold" data-i18n="ui.settingsAppearance.section.accent">アクセント色</h2>
            <div class="mt-3 flex flex-wrap gap-3">
              <button type="button" disabled class="w-10 h-10 rounded-full bg-[#a55c50] border-2 border-white dark:border-slate-700" aria-label="primary"></button>
              <button type="button" disabled class="w-10 h-10 rounded-full bg-slate-600" aria-label="slate"></button>
              <button type="button" disabled class="w-10 h-10 rounded-full bg-emerald-600" aria-label="emerald"></button>
              <button type="button" disabled class="w-10 h-10 rounded-full bg-indigo-600" aria-label="indigo"></button>
            </div>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <div class="flex flex-wrap items-center gap-2">
              <button type="button" disabled class="px-4 py-2 rounded-lg bg-primary/50 text-white text-sm font-semibold cursor-not-allowed" data-i18n="ui.settingsAppearance.save">
                保存
              </button>
              <span class="text-xs text-text-muted" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</span>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
    <script src="/ui/i18n/i18n.js" defer></script>
  </body>
</html>
