<!DOCTYPE html>
<html class="dark" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AI Orchestrator - connections</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#a55c50",
              "background-light": "#f7f6f6",
              "background-dark": "#1d1615",
              "card-dark": "#251f1e",
              "border-dark": "#3d3432",
              "text-muted": "#b1a7a5"
            },
            fontFamily: { display: ["Inter", "Noto Sans JP", "sans-serif"] }
          }
        }
      };
    </script>
    <style>
      body { font-family: "Inter", "Noto Sans JP", sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #3d3432; border-radius: 10px; }
    </style>
  </head>
  <body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
    <!-- PAGE_TITLE_KEY: ui.connections.title -->

    <div id="sidebar-root"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
      <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
  <h2 class="text-xl font-bold"><span data-i18n="ui.connections.title">ui.connections.title</span></h2>
  
</header>

      <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8">
        <section class="bg-white dark:bg-card-dark border border-border-dark rounded-xl p-6">
          <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
              <h1 class="text-xl font-bold" data-i18n="ui.connections.h1">接続一覧</h1>
              <p class="mt-2 text-sm text-text-muted" data-i18n="ui.connections.desc">Providerごとの接続状態を確認します。</p>
            </div>
            <a href="/ui/settings-connections.html" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-primary/90 transition-colors" data-i18n="ui.connections.add">
              接続を追加
            </a>
          </div>

          <section class="mt-6 rounded-lg border border-border-dark p-4">
            <h2 class="text-sm font-semibold" data-i18n="ui.connections.role.title">画面の役割</h2>
            <p class="mt-1 text-xs text-text-muted" data-i18n="ui.connections.role.desc">接続状態の確認と、設定画面への導線を提供します。</p>
          </section>

          <section class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2">
            <article class="rounded-lg border border-border-dark p-4">
              <p class="text-xs text-text-muted" data-i18n="ui.connections.card.updatedAt">最終更新</p>
              <p id="connections-updated-at-card" class="mt-1 font-mono text-xs">-</p>
            </article>
            <article class="rounded-lg border border-border-dark p-4">
              <p class="text-xs text-text-muted" data-i18n="ui.connections.card.total">接続数</p>
              <p id="connections-total-card" class="mt-1 text-sm font-semibold">0</p>
            </article>
          </section>

          <section class="mt-4 rounded-lg border border-border-dark p-4">
            <h2 class="text-sm font-semibold" data-i18n="ui.connections.filter.title">検索とフィルタ</h2>
            <p class="mt-1 text-xs text-text-muted" data-i18n="ui.connections.filter.desc">provider / status / keyword で絞り込みます。</p>
            <div class="mt-3 grid grid-cols-1 gap-3 md:grid-cols-3">
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.connections.filter.provider">provider</span>
                <select class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm">
                  <option value="" data-i18n="ui.connections.filter.all">すべて</option>
                  <option value="ai">ai</option>
                  <option value="github">github</option>
                  <option value="figma">figma</option>
                </select>
              </label>
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.connections.filter.status">status</span>
                <select class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm">
                  <option value="" data-i18n="ui.connections.filter.all">すべて</option>
                  <option value="connected">connected</option>
                  <option value="disconnected">disconnected</option>
                </select>
              </label>
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.connections.filter.keyword">keyword</span>
                <input type="text" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="key / notes" />
              </label>
            </div>
            <div class="mt-3 flex flex-wrap items-center gap-2">
              <button type="button" disabled class="px-3 py-2 rounded-lg border border-border-dark text-sm text-text-muted cursor-not-allowed" data-i18n="ui.connections.filter.apply">
                適用
              </button>
              <button type="button" disabled class="px-3 py-2 rounded-lg border border-border-dark text-sm text-text-muted cursor-not-allowed" data-i18n="ui.connections.filter.reset">
                リセット
              </button>
              <span class="text-xs text-text-muted" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</span>
            </div>
          </section>

          <div class="mt-6 overflow-x-auto rounded-lg border border-border-dark">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-100 dark:bg-background-dark/70">
                <tr class="text-left text-slate-600 dark:text-slate-300">
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.connections.col.key">key</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.connections.col.connected">connected</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.connections.col.status">Status</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.connections.col.account">Account</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.connections.col.updated">Updated</th>
                </tr>
              </thead>
              <tbody id="connections-table-body"></tbody>
            </table>
          </div>

          <div id="connections-feedback" class="mt-4 text-sm text-text-muted" data-i18n="common.loading">読み込み中</div>
          <button id="connections-retry" class="mt-2 px-3 py-2 rounded-lg border border-border-dark text-sm hover:bg-slate-100 dark:hover:bg-background-dark/80 hidden" type="button" data-i18n="common.retry">
            再試行
          </button>

          <div id="connections-empty-state" class="mt-6 rounded-lg border border-dashed border-border-dark p-6 text-center hidden">
            <p class="text-sm font-semibold" data-i18n="ui.connections.empty.title">接続がまだありません</p>
            <p class="mt-1 text-xs text-text-muted" data-i18n="ui.connections.empty.desc">接続を追加するとここに表示されます。</p>
          </div>
        </section>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
    <script src="/ui/i18n/i18n.js" defer></script>
    <script type="module">
      import { apiGet, setText, t } from "/ui/api.js";

      const tbody = document.getElementById("connections-table-body");
      const feedback = document.getElementById("connections-feedback");
      const retry = document.getElementById("connections-retry");
      const empty = document.getElementById("connections-empty-state");
      const updatedCard = document.getElementById("connections-updated-at-card");
      const totalCard = document.getElementById("connections-total-card");

      function clearRows() {
        if (tbody) tbody.innerHTML = "";
      }

      function toggleEmpty(show) {
        if (!empty) return;
        empty.classList.toggle("hidden", !show);
      }

      function buildStatusBadge(connected) {
        const badge = document.createElement("span");
        badge.className = "inline-flex px-2 py-1 rounded-full text-xs";
        if (connected) {
          badge.classList.add("bg-emerald-500/15", "text-emerald-500");
          badge.textContent = "connected";
        } else {
          badge.classList.add("bg-rose-500/15", "text-rose-500");
          badge.textContent = "disconnected";
        }
        return badge;
      }

      function appendRow(item, updatedAt) {
        if (!tbody) return;
        const tr = document.createElement("tr");
        tr.className = "border-t border-border-dark";

        const key = String(item && item.key ? item.key : "-");
        const connected = Boolean(item && item.connected);
        const account = item && (item.account || item.name) ? String(item.account || item.name) : "-";
        const updated = String(updatedAt || "-");

        const tdKey = document.createElement("td");
        tdKey.className = "px-4 py-3";
        const a = document.createElement("a");
        a.href = `/ui/connection.html?key=${encodeURIComponent(key)}`;
        a.className = "text-primary hover:underline";
        a.textContent = key;
        tdKey.appendChild(a);

        const tdConnected = document.createElement("td");
        tdConnected.className = "px-4 py-3";
        tdConnected.textContent = connected ? "true" : "false";

        const tdStatus = document.createElement("td");
        tdStatus.className = "px-4 py-3";
        tdStatus.appendChild(buildStatusBadge(connected));

        const tdAccount = document.createElement("td");
        tdAccount.className = "px-4 py-3";
        tdAccount.textContent = account;

        const tdUpdated = document.createElement("td");
        tdUpdated.className = "px-4 py-3";
        tdUpdated.textContent = updated;

        tr.append(tdKey, tdConnected, tdStatus, tdAccount, tdUpdated);
        tbody.appendChild(tr);
      }

      async function loadConnections() {
        clearRows();
        toggleEmpty(false);
        retry.classList.add("hidden");
        await setText(feedback, "common.loading", true);

        try {
          const payload = await apiGet("/connections");
          const items = Array.isArray(payload && payload.items) ? payload.items : [];
          const updatedAt = payload && payload.updated_at ? String(payload.updated_at) : "-";
          if (updatedCard) updatedCard.textContent = updatedAt;
          if (totalCard) totalCard.textContent = String(items.length);
          if (items.length === 0) {
            feedback.textContent = "";
            toggleEmpty(true);
            return;
          }
          items.forEach((item) => appendRow(item, updatedAt));
          feedback.textContent = "";
        } catch (error) {
          const msg = await t("common.error");
          feedback.textContent = `${msg}: ${error && error.message ? error.message : "unknown"}`;
          retry.classList.remove("hidden");
          toggleEmpty(false);
        }
      }

      retry.addEventListener("click", loadConnections);
      loadConnections();
    </script>
  </body>
</html>
