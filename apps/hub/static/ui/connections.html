<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Connections Registry</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
      primary:"#a55c50","background-light":"#f7f6f6","background-dark":"#1d1615","card-dark":"#251f1e","border-dark":"#3d3432","text-muted":"#b1a7a5"
    }, fontFamily:{display:["Inter","Noto Sans JP","sans-serif"]} } } };
  </script>
  <style>
    body { font-family: "Inter", "Noto Sans JP", sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3d3432; border-radius: 10px; }
  </style>
</head>
<body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
  <div id="sidebar-root"></div>
  <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
    <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
      <h2 class="text-xl font-bold">Connections Registry</h2>
      <a href="/ui/settings-connections.html" class="text-sm font-semibold text-primary hover:underline">account 追加へ</a>
    </header>
    <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8">
      <section class="bg-white dark:bg-card-dark border border-border-dark rounded-xl p-6">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h1 class="text-xl font-bold">接続一覧</h1>
            <p class="mt-2 text-sm text-text-muted">account / project / organization を横断した read-only registry です。実操作は scope 別の管理画面へ分離します。</p>
          </div>
          <span id="connections-status" class="text-xs text-text-muted">loading...</span>
        </div>
        <div class="mt-6 grid grid-cols-1 md:grid-cols-4 gap-3">
          <article class="rounded-lg border border-border-dark p-4">
            <p class="text-xs text-text-muted">All</p>
            <p id="connections-total-all" class="mt-1 text-lg font-semibold">0</p>
          </article>
          <article class="rounded-lg border border-border-dark p-4">
            <p class="text-xs text-text-muted">Account</p>
            <p id="connections-total-account" class="mt-1 text-lg font-semibold">0</p>
          </article>
          <article class="rounded-lg border border-border-dark p-4">
            <p class="text-xs text-text-muted">Project</p>
            <p id="connections-total-project" class="mt-1 text-lg font-semibold">0</p>
          </article>
          <article class="rounded-lg border border-border-dark p-4">
            <p class="text-xs text-text-muted">Organization</p>
            <p id="connections-total-organization" class="mt-1 text-lg font-semibold">0</p>
          </article>
        </div>
        <section class="mt-4 rounded-lg border border-border-dark p-4">
          <h2 class="text-sm font-semibold">Scope 導線</h2>
          <div class="mt-3 flex flex-wrap gap-2 text-sm">
            <a class="px-3 py-2 rounded-lg border border-border-dark hover:bg-slate-100 dark:hover:bg-background-dark/80" href="/ui/settings-connections.html">account</a>
            <a class="px-3 py-2 rounded-lg border border-border-dark hover:bg-slate-100 dark:hover:bg-background-dark/80" href="/ui/project-connections.html">project</a>
            <a class="px-3 py-2 rounded-lg border border-border-dark hover:bg-slate-100 dark:hover:bg-background-dark/80" href="/ui/connection.html">organization</a>
          </div>
        </section>
        <div class="mt-6 overflow-x-auto rounded-lg border border-border-dark">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-100 dark:bg-background-dark/70">
              <tr class="text-left text-slate-600 dark:text-slate-300">
                <th class="px-4 py-3 font-semibold">provider</th>
                <th class="px-4 py-3 font-semibold">scope</th>
                <th class="px-4 py-3 font-semibold">scope_id</th>
                <th class="px-4 py-3 font-semibold">status</th>
                <th class="px-4 py-3 font-semibold">updated</th>
              </tr>
            </thead>
            <tbody id="connections-table-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
  <script src="/ui/sidebar.js"></script>
  <script type="module">
    import { apiGet } from "/ui/api.js";

    const statusEl = document.getElementById("connections-status");
    const tbody = document.getElementById("connections-table-body");
    const totalAllEl = document.getElementById("connections-total-all");
    const totalAccountEl = document.getElementById("connections-total-account");
    const totalProjectEl = document.getElementById("connections-total-project");
    const totalOrganizationEl = document.getElementById("connections-total-organization");

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderRows(items) {
      if (!items.length) {
        tbody.innerHTML = '<tr><td class="px-4 py-3 text-text-muted" colspan="5">no connections</td></tr>';
        return;
      }
      tbody.innerHTML = items.map((item) => `
        <tr class="border-t border-border-dark">
          <td class="px-4 py-3">${escapeHtml(item.provider_key || "-")}</td>
          <td class="px-4 py-3">${escapeHtml(item.scope_type || "-")}</td>
          <td class="px-4 py-3">${escapeHtml(item.scope_id || "-")}</td>
          <td class="px-4 py-3">${escapeHtml(item.status || "-")}</td>
          <td class="px-4 py-3">${escapeHtml(item.updated_at || "-")}</td>
        </tr>
      `).join("");
    }

    async function loadConnections() {
      statusEl.textContent = "loading...";
      const [allPayload, projectPayload, projectsPayload] = await Promise.all([
        apiGet("/admin/connections"),
        apiGet("/admin/connections?scope_type=project"),
        apiGet("/projects"),
      ]);
      const items = Array.isArray(allPayload.items) ? allPayload.items : [];
      const projects = Array.isArray(projectsPayload.projects) ? projectsPayload.projects : [];
      renderRows(items);
      totalAllEl.textContent = String(items.length);
      totalAccountEl.textContent = String(items.filter((item) => item.scope_type === "account").length);
      totalProjectEl.textContent = String(items.filter((item) => item.scope_type === "project").length);
      totalOrganizationEl.textContent = String(items.filter((item) => item.scope_type === "organization").length);
      statusEl.textContent = `projects=${escapeHtml(String(projects.length))} / project_scope=${escapeHtml(String((projectPayload.items || []).length))}`;
    }

    loadConnections().catch((error) => {
      statusEl.textContent = error.message;
    });
  </script>
</body>
</html>
