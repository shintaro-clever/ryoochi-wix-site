<!DOCTYPE html>
<html class="dark" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Orchestrator AI - 設定 / Connections</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#a55c50",
              "background-light": "#f7f6f6",
              "background-dark": "#1d1615",
              "border-dark": "#3d3432",
              "text-muted": "#b1a7a5",
              "card-dark": "#251f1e"
            },
            fontFamily: { display: ["Inter", "sans-serif"] },
            borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }
          }
        }
      };
    </script>

    <style>
      body { font-family: "Inter", "Noto Sans JP", sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(165, 92, 80, 0.2); border-radius: 10px; }
      .status-pill { font-size: 11px; line-height: 1; padding: 6px 8px; border-radius: 9999px; font-weight: 700; }
    </style>
  </head>

  <body data-page="settings" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display flex h-screen overflow-hidden">
    <div id="sidebar-root"></div>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
  <h2 class="text-xl font-bold"><span data-i18n="ui.settingsConnections.title">設定 / Connections</span></h2>
  <a href="/ui/settings.html" class="text-xs text-primary hover:underline" data-i18n="ui.settingsConnections.back">設定トップへ戻る</a>
</header>

      <div class="flex-1 overflow-y-auto custom-scrollbar bg-background-light dark:bg-background-dark p-8">
        <div class="max-w-5xl space-y-6 pb-12">
          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h1 class="text-xl font-bold" data-i18n="ui.settingsConnections.h1">接続設定</h1>
            <p class="mt-2 text-sm text-slate-500 dark:text-slate-300" data-i18n="ui.settingsConnections.desc">provider別の接続設定UI骨格です。</p>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h2 class="text-lg font-bold" data-i18n="ui.settingsConnections.section.summary">接続状態サマリ</h2>
            <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-3">
              <div class="border border-primary/10 rounded-lg p-3">
                <p class="text-xs text-slate-500">ai</p>
                <p class="font-semibold mt-1">connected</p>
              </div>
              <div class="border border-primary/10 rounded-lg p-3">
                <p class="text-xs text-slate-500">github</p>
                <p class="font-semibold mt-1">connected</p>
              </div>
              <div class="border border-primary/10 rounded-lg p-3">
                <p class="text-xs text-slate-500">figma</p>
                <p class="font-semibold mt-1">disconnected</p>
              </div>
            </div>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h2 class="text-lg font-bold" data-i18n="ui.settingsConnections.section.form">接続設定フォーム</h2>
            <div class="mt-4 grid grid-cols-1 lg:grid-cols-3 gap-4">
              <article class="rounded-lg border border-primary/10 p-4">
                <h3 class="font-semibold">GitHub</h3>
                <label class="mt-3 block text-xs text-slate-500" data-i18n="ui.settingsConnections.field.githubRepo">github.repo</label>
                <input type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="owner/repo" />
                <label class="mt-2 block text-xs text-slate-500" data-i18n="ui.settingsConnections.field.githubToken">github.token</label>
                <input type="password" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" value="" placeholder="********" />
                <label class="mt-3 inline-flex items-center gap-2 text-sm">
                  <input type="checkbox" disabled />
                  <span data-i18n="ui.settingsConnections.field.enabled">enabled</span>
                </label>
              </article>

              <article class="rounded-lg border border-primary/10 p-4">
                <h3 class="font-semibold">Figma</h3>
                <label class="mt-3 block text-xs text-slate-500" data-i18n="ui.settingsConnections.field.figmaFileUrl">figma.fileUrl</label>
                <input type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="https://www.figma.com/file/..." />
                <label class="mt-2 block text-xs text-slate-500" data-i18n="ui.settingsConnections.field.figmaToken">figma.token</label>
                <input type="password" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" value="" placeholder="********" />
                <label class="mt-3 inline-flex items-center gap-2 text-sm">
                  <input type="checkbox" disabled />
                  <span data-i18n="ui.settingsConnections.field.enabled">enabled</span>
                </label>
              </article>

              <article class="rounded-lg border border-primary/10 p-4">
                <h3 class="font-semibold">AI</h3>
                <label class="mt-3 block text-xs text-slate-500" data-i18n="ui.settingsConnections.field.aiProvider">ai.provider</label>
                <input type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="openai" />
                <label class="mt-2 block text-xs text-slate-500" data-i18n="ui.settingsConnections.field.aiName">ai.name</label>
                <input type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="gpt-4.1" />
                <label class="mt-2 block text-xs text-slate-500" data-i18n="ui.settingsConnections.field.aiApiKey">ai.apiKey</label>
                <input type="password" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" value="" placeholder="********" />
                <label class="mt-3 inline-flex items-center gap-2 text-sm">
                  <input type="checkbox" disabled />
                  <span data-i18n="ui.settingsConnections.field.enabled">enabled</span>
                </label>
              </article>
            </div>

            <div class="mt-5 flex flex-wrap items-center gap-2">
              <button type="button" disabled class="px-4 py-2 rounded-lg bg-primary/50 text-white text-sm font-semibold cursor-not-allowed" data-i18n="ui.settingsConnections.save">保存</button>
              <span class="text-xs text-text-muted" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</span>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
    <script src="/ui/i18n/i18n.js" defer></script>
  </body>
</html>
