<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Project Audit</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
      primary:"#a55c50","background-light":"#f7f6f6","background-dark":"#1d1615","card-dark":"#251f1e","border-dark":"#3d3432","text-muted":"#b1a7a5"
    }, fontFamily:{display:["Inter","Noto Sans JP","sans-serif"]} } } };
  </script>
  <style>
    body { font-family: "Inter", "Noto Sans JP", sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3d3432; border-radius: 10px; }
  </style>
</head>
<body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
  <div id="sidebar-root"></div>
  <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
    <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
      <h2 class="text-xl font-bold">Project Audit</h2>
      <a href="/ui/ops-console.html" class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:underline">
        <span class="material-symbols-outlined text-base">open_in_new</span>
        <span>Ops Console へ</span>
      </a>
    </header>
    <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8 space-y-6">
      <section class="bg-white dark:bg-card-dark border border-border-dark rounded-xl p-6">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h1 class="text-xl font-bold">プロジェクト監査ログ</h1>
            <p class="mt-2 text-sm text-text-muted">project 単位で AI / 接続ライフサイクルの監査を read-only 参照します。権限変更や組織統制の全体像は Ops Console に分離します。</p>
          </div>
          <span id="project-audit-status" class="text-xs text-text-muted">loading...</span>
        </div>
        <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-3">
          <label class="text-sm">
            <span class="block text-xs text-text-muted mb-1">Project</span>
            <select id="project-audit-project" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm"></select>
          </label>
          <label class="text-sm">
            <span class="block text-xs text-text-muted mb-1">Domain</span>
            <select id="project-audit-group" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm">
              <option value="all">all</option>
              <option value="connection">connection</option>
              <option value="ai">ai</option>
              <option value="faq">faq</option>
            </select>
          </label>
          <label class="text-sm">
            <span class="block text-xs text-text-muted mb-1">Actor</span>
            <input id="project-audit-actor" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="acct_..." type="text"/>
          </label>
        </div>
        <div id="project-audit-summary" class="mt-6 grid grid-cols-1 md:grid-cols-4 gap-3"></div>
        <div class="mt-6 overflow-x-auto rounded-lg border border-border-dark">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-100 dark:bg-background-dark/70">
              <tr class="text-left text-slate-600 dark:text-slate-300">
                <th class="px-4 py-3 font-semibold">Time</th>
                <th class="px-4 py-3 font-semibold">Domain</th>
                <th class="px-4 py-3 font-semibold">Action</th>
                <th class="px-4 py-3 font-semibold">Actor</th>
                <th class="px-4 py-3 font-semibold">Context</th>
              </tr>
            </thead>
            <tbody id="project-audit-events">
              <tr><td class="px-4 py-3 text-text-muted" colspan="5">loading...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
  <script src="/ui/sidebar.js"></script>
  <script type="module">
    import { apiGet } from "/ui/api.js";

    const statusEl = document.getElementById("project-audit-status");
    const projectEl = document.getElementById("project-audit-project");
    const groupEl = document.getElementById("project-audit-group");
    const actorEl = document.getElementById("project-audit-actor");
    const summaryEl = document.getElementById("project-audit-summary");
    const eventsEl = document.getElementById("project-audit-events");

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderSummary(summary) {
      summaryEl.innerHTML = [
        { label: "All Events", value: summary.total_events || 0 },
        { label: "Connection", value: summary.connection_events || 0 },
        { label: "AI", value: summary.ai_events || 0 },
        { label: "FAQ", value: summary.faq_events || 0 },
      ].map((item) => `
        <article class="rounded-lg border border-border-dark p-4">
          <p class="text-xs text-text-muted">${escapeHtml(item.label)}</p>
          <p class="mt-2 text-xl font-bold">${escapeHtml(String(item.value))}</p>
        </article>
      `).join("");
    }

    function renderEvents(events) {
      const rows = Array.isArray(events) ? events : [];
      if (!rows.length) {
        eventsEl.innerHTML = '<tr><td class="px-4 py-3 text-text-muted" colspan="5">no events</td></tr>';
        return;
      }
      eventsEl.innerHTML = rows.map((event) => `
        <tr class="border-t border-border-dark">
          <td class="px-4 py-3">${escapeHtml(event.created_at || "-")}</td>
          <td class="px-4 py-3">${escapeHtml(event.group || "-")}</td>
          <td class="px-4 py-3">${escapeHtml(event.action || "-")}</td>
          <td class="px-4 py-3">${escapeHtml(event.actor_id || "system")}</td>
          <td class="px-4 py-3 text-text-muted">${escapeHtml([event.meta && event.meta.project_id, event.meta && event.meta.scope_type, event.meta && event.meta.failure_code].filter(Boolean).join(" / ") || "-")}</td>
        </tr>
      `).join("");
    }

    async function loadProjects() {
      const payload = await apiGet("/projects");
      const items = Array.isArray(payload.projects) ? payload.projects : [];
      projectEl.innerHTML = items.map((item) => `<option value="${escapeHtml(item.id)}">${escapeHtml(item.name || item.id)}</option>`).join("");
      return items;
    }

    async function loadAudit() {
      statusEl.textContent = "loading...";
      const params = new URLSearchParams();
      if (projectEl.value) params.set("project_id", projectEl.value);
      if (groupEl.value) params.set("action_group", groupEl.value);
      if (actorEl.value.trim()) params.set("actor_id", actorEl.value.trim());
      params.set("limit", "40");
      const payload = await apiGet(`/admin/audit-overview?${params.toString()}`);
      renderSummary(payload.summary || {});
      renderEvents(payload.recent_events || []);
      statusEl.textContent = `events=${escapeHtml(String((payload.summary || {}).total_events || 0))}`;
    }

    Promise.resolve()
      .then(loadProjects)
      .then(() => loadAudit())
      .catch((error) => {
        statusEl.textContent = error.message;
      });

    [projectEl, groupEl].forEach((node) => node.addEventListener("change", () => {
      loadAudit().catch((error) => {
        statusEl.textContent = error.message;
      });
    }));
  </script>
</body>
</html>
