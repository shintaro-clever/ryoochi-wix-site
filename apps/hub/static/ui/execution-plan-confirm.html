<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Execution Plan Confirm</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: "Inter", "Noto Sans JP", sans-serif; }
  </style>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen">
  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
    <header class="flex flex-wrap items-center justify-between gap-3">
      <div>
        <p class="text-xs uppercase tracking-[0.24em] text-amber-300">Server-enforced Confirm</p>
        <h1 class="mt-2 text-2xl font-semibold">Execution Plan Confirm</h1>
        <p class="mt-2 text-sm text-stone-400">UI ボタンではなく server の状態遷移を確認する画面です。</p>
      </div>
      <a href="/ui/project-workspace.html" class="px-3 py-2 rounded-lg border border-stone-700 text-sm hover:bg-stone-900">Workspace へ戻る</a>
    </header>

    <section class="rounded-2xl border border-amber-500/40 bg-amber-500/10 p-4">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
        <div><span class="text-stone-400">承認者</span><p id="confirm-approver" class="mt-1 font-medium">-</p></div>
        <div><span class="text-stone-400">期限</span><p id="confirm-expiry" class="mt-1 font-medium">-</p></div>
        <div><span class="text-stone-400">状態</span><p id="confirm-state" class="mt-1 font-medium">-</p></div>
      </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <article class="rounded-2xl border border-stone-800 bg-stone-900/70 p-4">
        <h2 class="text-sm font-semibold text-amber-200">summary</h2>
        <p id="confirm-summary" class="mt-2 text-sm text-stone-200">plan_id を指定すると表示します。</p>
      </article>
      <article class="rounded-2xl border border-stone-800 bg-stone-900/70 p-4">
        <h2 class="text-sm font-semibold text-amber-200">risk_level</h2>
        <p id="confirm-risk-level" class="mt-2 text-sm text-stone-200">-</p>
      </article>
      <article class="rounded-2xl border border-stone-800 bg-stone-900/70 p-4">
        <h2 class="text-sm font-semibold text-amber-200">変更対象</h2>
        <pre id="confirm-target-refs" class="mt-2 text-xs whitespace-pre-wrap text-stone-300">[]</pre>
      </article>
      <article class="rounded-2xl border border-stone-800 bg-stone-900/70 p-4">
        <h2 class="text-sm font-semibold text-amber-200">影響範囲</h2>
        <pre id="confirm-impact-scope" class="mt-2 text-xs whitespace-pre-wrap text-stone-300">{}</pre>
      </article>
      <article class="rounded-2xl border border-stone-800 bg-stone-900/70 p-4">
        <h2 class="text-sm font-semibold text-amber-200">expected_changes</h2>
        <pre id="confirm-expected-changes" class="mt-2 text-xs whitespace-pre-wrap text-stone-300">[]</pre>
      </article>
      <article class="rounded-2xl border border-stone-800 bg-stone-900/70 p-4">
        <h2 class="text-sm font-semibold text-amber-200">rollback</h2>
        <pre id="confirm-rollback-plan" class="mt-2 text-xs whitespace-pre-wrap text-stone-300">{}</pre>
      </article>
      <article class="rounded-2xl border border-stone-800 bg-stone-900/70 p-4 lg:col-span-2">
        <h2 class="text-sm font-semibold text-amber-200">根拠</h2>
        <pre id="confirm-evidence-refs" class="mt-2 text-xs whitespace-pre-wrap text-stone-300">{}</pre>
      </article>
    </section>
  </main>

  <script type="module">
    import { apiGet } from "/ui/api.js";

    const params = new URLSearchParams(window.location.search || "");
    const planId = (params.get("plan_id") || "").trim();
    const writePlanId = (params.get("write_plan_id") || "").trim();
    const setText = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    };
    const setJson = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.textContent = JSON.stringify(value ?? null, null, 2);
    };

    async function load() {
      if (!planId && !writePlanId) return;
      try {
        let plan = null;
        if (planId) {
          plan = await apiGet(`/execution-plans/${encodeURIComponent(planId)}`);
        } else {
          const writePlan = await apiGet(`/write-plans/${encodeURIComponent(writePlanId)}`);
          if (writePlan.related_execution_plan?.plan_id) {
            plan = await apiGet(`/execution-plans/${encodeURIComponent(writePlan.related_execution_plan.plan_id)}`);
          } else {
            setText("confirm-approver", "-");
            setText("confirm-expiry", "-");
            setText("confirm-state", `${writePlan.approval_state || "approval_pending"} / execution_plan=not_created`);
            setText("confirm-summary", writePlan.summary || "execution plan not created yet");
            setText("confirm-risk-level", "-");
            setJson("confirm-target-refs", writePlan.target_refs || []);
            setJson("confirm-impact-scope", {});
            setJson("confirm-expected-changes", writePlan.expected_changes || []);
            setJson("confirm-rollback-plan", {});
            setJson("confirm-evidence-refs", writePlan.evidence_refs || {});
            return;
          }
        }
        setText("confirm-approver", plan.approved_by || plan.confirm_session?.actor_id || "-");
        setText("confirm-expiry", plan.confirm_session?.expires_at || "-");
        setText("confirm-state", `${plan.confirm_state} / confirm_required=${String(plan.confirm_required)}`);
        setText("confirm-summary", plan.summary || "-");
        setText("confirm-risk-level", plan.risk_level || "-");
        setJson("confirm-target-refs", plan.target_refs || []);
        setJson("confirm-impact-scope", plan.impact_scope || {});
        setJson("confirm-expected-changes", plan.expected_changes || []);
        setJson("confirm-rollback-plan", plan.rollback_plan || {});
        setJson("confirm-evidence-refs", plan.evidence_refs || {});
      } catch (error) {
        setText("confirm-summary", error.message || "failed to load plan");
      }
    }

    load();
  </script>
</body>
</html>
