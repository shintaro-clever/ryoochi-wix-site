<!DOCTYPE html>
<html class="dark" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Orchestrator AI - 設定 / Drive出力先</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#a55c50",
              "background-light": "#f7f6f6",
              "background-dark": "#1d1615",
              "border-dark": "#3d3432",
              "text-muted": "#b1a7a5",
              "card-dark": "#251f1e"
            },
            fontFamily: { display: ["Inter", "sans-serif"] },
            borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }
          }
        }
      };
    </script>

    <style>
      body { font-family: "Inter", "Noto Sans JP", sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(165, 92, 80, 0.2); border-radius: 10px; }
    </style>
  </head>

  <body data-page="settings" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display flex h-screen overflow-hidden">
    <div id="sidebar-root"></div>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
  <h2 class="text-xl font-bold"><span data-i18n="ui.settingsDrive.title">設定 / Drive</span></h2>
  <a href="/ui/settings.html" class="text-xs text-primary hover:underline" data-i18n="ui.settingsDrive.back">設定トップへ戻る</a>
</header>

      <div class="flex-1 overflow-y-auto custom-scrollbar bg-background-light dark:bg-background-dark p-8">
        <div class="max-w-5xl space-y-6 pb-12">
          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h1 class="text-xl font-bold" data-i18n="ui.settingsDrive.h1">Drive設定</h1>
            <p class="mt-2 text-sm text-slate-500 dark:text-slate-300" data-i18n="ui.settingsDrive.desc">Drive連携状態と出力先フォルダを管理するUI骨格です。</p>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h2 class="text-lg font-bold" data-i18n="ui.settingsDrive.section.status">Drive連携状態</h2>
            <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-3">
              <div class="border border-primary/10 rounded-lg p-3">
                <p class="text-xs text-slate-500" data-i18n="ui.settingsDrive.card.state">状態</p>
                <p class="font-semibold mt-1">connected</p>
              </div>
              <div class="border border-primary/10 rounded-lg p-3">
                <p class="text-xs text-slate-500" data-i18n="ui.settingsDrive.card.account">アカウント</p>
                <p class="font-semibold mt-1">service-account@example.com</p>
              </div>
              <div class="border border-primary/10 rounded-lg p-3">
                <p class="text-xs text-slate-500" data-i18n="ui.settingsDrive.card.updatedAt">最終更新</p>
                <p class="font-semibold mt-1">2026-03-05T00:00:00Z</p>
              </div>
            </div>

            <div class="mt-4 flex flex-wrap items-center gap-2">
              <button type="button" disabled class="px-4 py-2 rounded-lg bg-primary/50 text-white text-sm font-semibold cursor-not-allowed" data-i18n="ui.settingsDrive.action.connect">接続</button>
              <button type="button" disabled class="px-4 py-2 rounded-lg border border-border-dark text-sm text-text-muted cursor-not-allowed" data-i18n="ui.settingsDrive.action.reauth">再認証</button>
              <button type="button" disabled class="px-4 py-2 rounded-lg border border-rose-500/40 text-rose-600 text-sm cursor-not-allowed" data-i18n="ui.settingsDrive.action.disconnect">解除</button>
              <span class="text-xs text-text-muted" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</span>
            </div>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h2 class="text-lg font-bold" data-i18n="ui.settingsDrive.section.folder">対象フォルダ</h2>
            <div class="mt-4 grid grid-cols-1 gap-4">
              <label class="block">
                <span class="text-xs text-slate-500" data-i18n="ui.settingsDrive.field.folderId">フォルダID</span>
                <input type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="1A2B3C..." />
              </label>
              <label class="block">
                <span class="text-xs text-slate-500" data-i18n="ui.settingsDrive.field.folderUrl">フォルダURL</span>
                <input type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="https://drive.google.com/drive/folders/..." />
              </label>
              <label class="block">
                <span class="text-xs text-slate-500" data-i18n="ui.settingsDrive.field.allowedPaths">許可パス</span>
                <textarea rows="3" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm font-mono" placeholder="/OrchestratorAI/Exports"></textarea>
              </label>
            </div>
            <div class="mt-4 flex flex-wrap items-center gap-2">
              <button type="button" disabled class="px-4 py-2 rounded-lg bg-primary/50 text-white text-sm font-semibold cursor-not-allowed" data-i18n="ui.settingsDrive.save">保存</button>
              <span class="text-xs text-text-muted" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</span>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
    <script src="/ui/i18n/i18n.js" defer></script>
  </body>
</html>
