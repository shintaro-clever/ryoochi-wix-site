<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Organization Invites</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
      accent:"#14b8a6","adminBg":"#020617","adminCard":"#0f172a","adminMuted":"#94a3b8","adminLine":"#1e293b"
    }, fontFamily:{display:["IBM Plex Sans","sans-serif"]}, borderRadius:{DEFAULT:"0.375rem",lg:"0.75rem",xl:"1rem",full:"9999px"} } } };
  </script>
  <style>
    body{font-family:'IBM Plex Sans',"Noto Sans JP",sans-serif;}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
    .custom-scrollbar::-webkit-scrollbar{width:6px;}
    .custom-scrollbar::-webkit-scrollbar-thumb{background:#1e293b;border-radius:999px;}
  </style>
</head>
<body data-page="admin-console" data-layout="admin" class="bg-adminBg text-slate-100 min-h-screen flex overflow-hidden">
  <div id="sidebar-root"></div>

  <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
    <header class="border-b border-adminLine bg-slate-950/80 backdrop-blur px-6 md:px-8 py-5 flex items-center justify-between gap-4">
      <div>
        <p class="text-[11px] font-semibold uppercase tracking-[0.28em] text-emerald-300">Admin Console</p>
        <h1 class="mt-2 text-2xl font-bold">Organization Invites</h1>
        <p class="mt-2 text-sm text-adminMuted">招待状態は `pending / accepted / expired / revoked` を RBAC API から取得します。ここでは新規招待作成と revoke を扱います。</p>
      </div>
      <div class="flex items-center gap-3 text-xs">
        <a href="/ui/project-members.html" class="text-emerald-300 hover:underline">Members</a>
        <a href="/ui/admin-console.html" class="text-emerald-300 hover:underline">Admin Console</a>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 space-y-6">
      <section class="rounded-3xl border border-adminLine bg-adminCard p-6">
        <div class="grid grid-cols-1 xl:grid-cols-[minmax(18rem,24rem)_minmax(0,1fr)] gap-4">
          <section class="rounded-2xl border border-adminLine p-4">
            <label class="block text-xs text-adminMuted">
              Organization
              <select id="invites-organization" class="mt-2 w-full rounded-xl border border-adminLine bg-slate-950 px-3 py-2 text-sm"></select>
            </label>
            <form id="invite-form" class="mt-4 space-y-3">
              <label class="block text-xs text-adminMuted">
                Email
                <input name="email" type="email" required class="mt-2 w-full rounded-xl border border-adminLine bg-slate-950 px-3 py-2 text-sm" placeholder="member@example.com"/>
              </label>
              <label class="block text-xs text-adminMuted">
                Expires At
                <input name="expires_at" type="datetime-local" class="mt-2 w-full rounded-xl border border-adminLine bg-slate-950 px-3 py-2 text-sm"/>
              </label>
              <div>
                <p class="text-xs text-adminMuted">Proposed Roles</p>
                <div id="invite-role-options" class="mt-2 flex flex-wrap gap-2"></div>
              </div>
              <button type="submit" class="w-full rounded-xl bg-emerald-500 px-4 py-2 text-sm font-semibold text-slate-950 hover:bg-emerald-400">招待を作成</button>
            </form>
            <p id="invites-form-status" class="mt-3 text-xs text-adminMuted">organization を選択すると role 候補を表示します。</p>
          </section>

          <section class="rounded-2xl border border-adminLine p-4">
            <div class="flex items-center justify-between gap-3">
              <div>
                <h2 class="text-lg font-semibold">Invite Status</h2>
                <p class="mt-1 text-sm text-adminMuted">招待状態と proposed role を一覧表示し、revoke できます。</p>
              </div>
              <span id="invites-status" class="text-xs text-adminMuted">loading...</span>
            </div>
            <div id="invites-empty" class="mt-4 hidden rounded-2xl border border-dashed border-adminLine p-6 text-sm text-adminMuted">invite がまだありません。</div>
            <div id="invites-list" class="mt-4 space-y-3"></div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script src="/ui/sidebar.js"></script>
  <script type="module">
    import { apiGet, apiPost } from "/ui/api.js";

    const orgSelect = document.getElementById("invites-organization");
    const roleOptionsEl = document.getElementById("invite-role-options");
    const formEl = document.getElementById("invite-form");
    const formStatusEl = document.getElementById("invites-form-status");
    const statusEl = document.getElementById("invites-status");
    const listEl = document.getElementById("invites-list");
    const emptyEl = document.getElementById("invites-empty");

    let selectedOrganizationId = "";
    let roles = [];
    let invites = [];

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function queryOrganizationId() {
      const url = new URL(window.location.href);
      return String(url.searchParams.get("organization_id") || "").trim();
    }

    function writeOrganizationIdToUrl(organizationId) {
      const url = new URL(window.location.href);
      if (organizationId) url.searchParams.set("organization_id", organizationId);
      else url.searchParams.delete("organization_id");
      window.history.replaceState({}, "", url);
    }

    function renderRoleOptions() {
      roleOptionsEl.innerHTML = roles.map((role) => `
        <label class="inline-flex items-center gap-2 rounded-full border border-adminLine px-3 py-1 text-xs">
          <input type="checkbox" value="${escapeHtml(role.role_id)}"/>
          <span>${escapeHtml(role.key)}</span>
        </label>
      `).join("");
    }

    function inviteCard(invite) {
      return `
        <article class="rounded-2xl border border-adminLine bg-slate-950/40 p-4">
          <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
              <p class="font-semibold">${escapeHtml(invite.email || "-")}</p>
              <div class="mt-3 flex flex-wrap gap-2">
                ${(invite.proposed_roles || []).map((role) => `<span class="rounded-full border border-adminLine px-2 py-1 text-[11px]">${escapeHtml(role.key)}</span>`).join("") || '<span class="text-xs text-adminMuted">role 未設定</span>'}
              </div>
            </div>
            <span class="rounded-full border border-adminLine px-3 py-1 text-xs">${escapeHtml(invite.status || "-")}</span>
          </div>
          <dl class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
            <div><dt class="text-adminMuted text-xs">invited_by</dt><dd class="mt-1 break-all">${escapeHtml(invite.invited_by || "-")}</dd></div>
            <div><dt class="text-adminMuted text-xs">created_at</dt><dd class="mt-1">${escapeHtml(invite.created_at || "-")}</dd></div>
            <div><dt class="text-adminMuted text-xs">expires_at</dt><dd class="mt-1">${escapeHtml(invite.expires_at || "-")}</dd></div>
          </dl>
          <div class="mt-4 flex justify-end">
            <button type="button" data-revoke-invite="${escapeHtml(invite.invite_id)}" ${invite.status === "revoked" ? "disabled" : ""} class="rounded-xl border border-rose-500/40 px-4 py-2 text-sm text-rose-300 hover:bg-rose-500/10 disabled:opacity-40 disabled:cursor-not-allowed">revoke</button>
          </div>
        </article>
      `;
    }

    function attachInviteHandlers() {
      Array.from(document.querySelectorAll("[data-revoke-invite]")).forEach((button) => {
        button.addEventListener("click", async () => {
          const inviteId = button.getAttribute("data-revoke-invite") || "";
          if (!inviteId) return;
          statusEl.textContent = "revoking invite...";
          try {
            await apiPost(`/admin/organizations/${selectedOrganizationId}/invites/${inviteId}/revoke`, {});
            await loadOrganizationData(selectedOrganizationId);
          } catch (error) {
            statusEl.textContent = error.message || "invite revoke failed";
          }
        });
      });
    }

    function renderInvites() {
      emptyEl.classList.toggle("hidden", invites.length > 0);
      listEl.innerHTML = invites.map(inviteCard).join("");
      attachInviteHandlers();
      statusEl.textContent = `${invites.length} invites loaded`;
    }

    async function loadOrganizations() {
      const payload = await apiGet("/admin/organizations");
      const organizations = Array.isArray(payload.organizations) ? payload.organizations : [];
      orgSelect.innerHTML = organizations.map((item) => `
        <option value="${escapeHtml(item.organization_id)}">${escapeHtml(item.name)} (${escapeHtml(item.status)})</option>
      `).join("");
      const preferred = queryOrganizationId();
      selectedOrganizationId =
        organizations.find((item) => item.organization_id === preferred)?.organization_id ||
        organizations[0]?.organization_id ||
        "";
      if (selectedOrganizationId) {
        orgSelect.value = selectedOrganizationId;
        writeOrganizationIdToUrl(selectedOrganizationId);
      }
      return organizations;
    }

    async function loadOrganizationData(organizationId) {
      if (!organizationId) {
        invites = [];
        roles = [];
        renderRoleOptions();
        renderInvites();
        statusEl.textContent = "organization がありません";
        return;
      }
      selectedOrganizationId = organizationId;
      writeOrganizationIdToUrl(organizationId);
      statusEl.textContent = "loading invites...";
      const [invitePayload, rolePayload] = await Promise.all([
        apiGet(`/admin/organizations/${organizationId}/invites`),
        apiGet(`/admin/organizations/${organizationId}/roles`),
      ]);
      invites = Array.isArray(invitePayload.invites) ? invitePayload.invites : [];
      roles = Array.isArray(rolePayload.roles) ? rolePayload.roles : [];
      renderRoleOptions();
      renderInvites();
      formStatusEl.textContent = `organization_id=${organizationId} / roles=${roles.length}`;
    }

    orgSelect.addEventListener("change", async () => {
      try {
        await loadOrganizationData(String(orgSelect.value || "").trim());
      } catch (error) {
        statusEl.textContent = error.message || "invite load failed";
      }
    });

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!selectedOrganizationId) return;
      const formData = new FormData(formEl);
      const roleIds = Array.from(roleOptionsEl.querySelectorAll('input[type="checkbox"]:checked')).map((input) => input.value);
      const payload = {
        email: String(formData.get("email") || "").trim(),
        expires_at: String(formData.get("expires_at") || "").trim()
          ? new Date(String(formData.get("expires_at"))).toISOString()
          : "",
        proposed_role_ids: roleIds,
      };
      formStatusEl.textContent = "creating invite...";
      try {
        await apiPost(`/admin/organizations/${selectedOrganizationId}/invites`, payload);
        formEl.reset();
        renderRoleOptions();
        await loadOrganizationData(selectedOrganizationId);
        formStatusEl.textContent = "invite created";
      } catch (error) {
        formStatusEl.textContent = error.message || "invite create failed";
      }
    });

    (async () => {
      try {
        const items = await loadOrganizations();
        if (!items.length) {
          statusEl.textContent = "organization がありません";
          formStatusEl.textContent = "まず /api/admin/organizations で organization を作成してください。";
          emptyEl.classList.remove("hidden");
          return;
        }
        await loadOrganizationData(selectedOrganizationId);
      } catch (error) {
        statusEl.textContent = error.message || "invite load failed";
      }
    })();
  </script>
</body>
</html>
