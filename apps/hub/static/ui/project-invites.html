<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Orchestrator AI - Project Invites</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
      primary:"#a55c50","background-light":"#f7f6f6","background-dark":"#1d1615",
      "card-dark":"#251f1e","border-dark":"#3d3432","text-muted":"#b1a7a5"
    }, fontFamily:{display:["Inter","Noto Sans JP","sans-serif"]} } } };
  </script>
  <style>
    body { font-family: "Inter", "Noto Sans JP", sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3d3432; border-radius: 10px; }
  </style>
</head>
<body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
  <aside class="w-64 flex-shrink-0 border-r border-primary/10 bg-background-dark flex flex-col h-screen">
  <div class="p-6 flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-white">
      <span class="material-symbols-outlined text-xl">auto_fix</span>
    </div>
    <h1 class="text-lg font-bold tracking-tight text-white">Orchestrator AI</h1>
  </div>

  <nav class="flex-1 px-4 py-2 space-y-1 overflow-y-auto custom-scrollbar">
    <div class="pb-4">
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="nav.menu">メニュー</p>
      <a data-nav-key="dashboard" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/dashboard.html"><span class="material-symbols-outlined">dashboard</span><span class="text-sm font-medium" data-i18n="nav.dashboard">ダッシュボード</span></a>
      <a data-nav-key="projects" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/projects.html"><span class="material-symbols-outlined">folder</span><span class="text-sm font-medium" data-i18n="nav.projects">プロジェクト</span></a>
      <a data-nav-key="analytics" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/analytics.html"><span class="material-symbols-outlined">bar_chart</span><span class="text-sm font-medium" data-i18n="nav.analytics">アナリティクス</span></a>
      <a data-nav-key="settings" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/settings.html"><span class="material-symbols-outlined">settings</span><span class="text-sm font-medium" data-i18n="nav.settings">設定</span></a>
    </div>
  </nav>
</aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
    <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
      <h2 class="text-xl font-bold"><span data-i18n="ui.projectInvites.title">ui.projectInvites.title</span></h2>
      <a href="/ui/project.html" class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:underline">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        <span data-i18n="ui.projectInvites.back">Project概要へ戻る</span>
      </a>
    </header>

    <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8 space-y-6">
      <section class="bg-white dark:bg-card-dark border border-border-dark rounded-xl p-6">
        <h1 class="text-xl font-bold" data-i18n="ui.projectInvites.h1">プロジェクト招待</h1>
        <p class="mt-2 text-sm text-text-muted" data-i18n="ui.projectInvites.desc">招待の作成と状態管理を行います。</p>

        <section class="mt-6 rounded-lg border border-border-dark p-4">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <label class="text-sm">
              <span class="block text-xs text-text-muted mb-1" data-i18n="ui.projectInvites.form.email">Email</span>
              <input disabled class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 opacity-60 cursor-not-allowed" placeholder="member@example.com" type="email" />
            </label>
            <label class="text-sm">
              <span class="block text-xs text-text-muted mb-1" data-i18n="ui.projectInvites.form.role">Role</span>
              <select disabled class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 opacity-60 cursor-not-allowed">
                <option>Viewer</option><option>Editor</option><option>Admin</option>
              </select>
            </label>
            <label class="text-sm">
              <span class="block text-xs text-text-muted mb-1" data-i18n="ui.projectInvites.form.expires">Expires</span>
              <input disabled class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 opacity-60 cursor-not-allowed" type="date" />
            </label>
            <div class="flex items-end">
              <button disabled class="w-full px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold opacity-60 cursor-not-allowed" type="button" data-i18n="ui.projectInvites.form.send">招待を送信</button>
            </div>
          </div>
          <p class="mt-3 text-xs text-amber-600" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</p>
        </section>

        <div class="mt-6 overflow-x-auto rounded-lg border border-border-dark">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-100 dark:bg-background-dark/70">
              <tr class="text-left text-slate-600 dark:text-slate-300">
                <th class="px-4 py-3 font-semibold" data-i18n="ui.projectInvites.col.email">Email</th>
                <th class="px-4 py-3 font-semibold" data-i18n="ui.projectInvites.col.role">Role</th>
                <th class="px-4 py-3 font-semibold" data-i18n="ui.projectInvites.col.status">Status</th>
                <th class="px-4 py-3 font-semibold" data-i18n="ui.projectInvites.col.created">Created</th>
                <th class="px-4 py-3 font-semibold" data-i18n="ui.projectInvites.col.expires">Expires</th>
                <th class="px-4 py-3 font-semibold" data-i18n="ui.projectInvites.col.actions">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr class="border-t border-border-dark">
                <td class="px-4 py-3">new-member@example.com</td>
                <td class="px-4 py-3">Editor</td>
                <td class="px-4 py-3"><span class="inline-flex px-2 py-1 rounded-full text-xs bg-amber-500/15 text-amber-500">pending</span></td>
                <td class="px-4 py-3">2026-03-05</td>
                <td class="px-4 py-3">2026-03-12</td>
                <td class="px-4 py-3">
                  <div class="flex gap-2">
                    <button disabled class="text-xs px-2 py-1 rounded border border-border-dark opacity-60 cursor-not-allowed" type="button" data-i18n="ui.projectInvites.action.resend">再送</button>
                    <button disabled class="text-xs px-2 py-1 rounded border border-rose-500/40 text-rose-600 opacity-60 cursor-not-allowed" type="button" data-i18n="ui.projectInvites.action.revoke">失効</button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="/ui/sidebar.js"></script>
  <script src="/ui/i18n/i18n.js" defer></script>
</body>
</html>
