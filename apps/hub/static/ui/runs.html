<!DOCTYPE html>
<html class="dark" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AI Orchestrator - runs</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#a55c50",
              "background-light": "#f7f6f6",
              "background-dark": "#1d1615",
              "card-dark": "#251f1e",
              "border-dark": "#3d3432",
              "text-muted": "#b1a7a5"
            },
            fontFamily: { display: ["Inter", "Noto Sans JP", "sans-serif"] }
          }
        }
      };
    </script>
    <style>
      body { font-family: "Inter", "Noto Sans JP", sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #3d3432; border-radius: 10px; }
    </style>
  </head>
  <body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
    <!-- PAGE_TITLE_KEY: ui.runs.title -->

    <div id="sidebar-root"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
      <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
  <h2 class="text-xl font-bold"><span data-i18n="ui.runs.title">ui.runs.title</span></h2>
  
</header>

      <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8">
        <section class="bg-white dark:bg-card-dark border border-border-dark rounded-xl p-6">
          <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
              <h1 class="text-xl font-bold" data-i18n="ui.runs.h1">実行一覧</h1>
              <p class="mt-2 text-sm text-text-muted" data-i18n="ui.runs.desc">Runの実行履歴と状態を確認します。</p>
            </div>
            <button id="create-run-button" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-primary/90 transition-colors" type="button" data-i18n="ui.runs.action.createRun">
              新規Run
            </button>
          </div>

          <section class="mt-6 rounded-lg border border-border-dark p-4">
            <h2 class="text-sm font-semibold" data-i18n="ui.runs.filter.title">検索とフィルタ</h2>
            <p class="mt-1 text-xs text-text-muted" data-i18n="ui.runs.filter.desc">job_type / status / keyword で絞り込みます。</p>
            <div class="mt-3 grid grid-cols-1 gap-3 md:grid-cols-3">
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.runs.filter.jobType">job_type</span>
                <select class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm">
                  <option value="" data-i18n="ui.runs.filter.all">すべて</option>
                  <option value="integration_hub.phase1.code_to_figma_from_url">integration_hub.phase1.code_to_figma_from_url</option>
                  <option value="integration_hub.phase2.mcp.spawn_smoke.github">integration_hub.phase2.mcp.spawn_smoke.github</option>
                </select>
              </label>
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.runs.filter.status">status</span>
                <select class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm">
                  <option value="" data-i18n="ui.runs.filter.all">すべて</option>
                  <option value="queued">queued</option>
                  <option value="running">running</option>
                  <option value="ok">ok</option>
                  <option value="error">error</option>
                </select>
              </label>
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.runs.filter.keyword">keyword</span>
                <input type="text" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="run_id / artifact" />
              </label>
            </div>
            <div class="mt-3 flex flex-wrap items-center gap-2">
              <button type="button" disabled class="px-3 py-2 rounded-lg border border-border-dark text-sm text-text-muted cursor-not-allowed" data-i18n="ui.runs.filter.apply">
                適用
              </button>
              <button type="button" disabled class="px-3 py-2 rounded-lg border border-border-dark text-sm text-text-muted cursor-not-allowed" data-i18n="ui.runs.filter.reset">
                リセット
              </button>
              <span class="text-xs text-text-muted" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</span>
            </div>
          </section>

          <section id="create-run-panel" class="mt-4 rounded-lg border border-border-dark p-4 hidden">
            <h2 class="text-sm font-semibold" data-i18n="ui.runs.create.title">新規Run作成</h2>
            <p class="mt-1 text-xs text-text-muted" data-i18n="ui.runs.create.desc">job_type / inputs / target_path を指定して作成します。</p>
            <div class="mt-3 grid grid-cols-1 gap-3">
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.runs.create.jobType">job_type</span>
                <select class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm">
                  <option value="integration_hub.phase1.code_to_figma_from_url">integration_hub.phase1.code_to_figma_from_url</option>
                  <option value="integration_hub.phase2.mcp.spawn_smoke.github">integration_hub.phase2.mcp.spawn_smoke.github</option>
                  <option value="integration_hub.phase2.mcp.spawn_smoke.figma">integration_hub.phase2.mcp.spawn_smoke.figma</option>
                </select>
              </label>
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.runs.create.inputs">inputs (JSON)</span>
                <textarea rows="4" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm font-mono" placeholder='{"url":"https://example.com"}'></textarea>
              </label>
              <label class="text-sm">
                <span class="mb-1 block text-xs text-text-muted" data-i18n="ui.runs.create.targetPath">target_path</span>
                <input type="text" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm font-mono" placeholder=".ai-runs/{run_id}/result.json" />
              </label>
            </div>
            <div class="mt-3 flex flex-wrap items-center gap-2">
              <button type="button" disabled class="px-4 py-2 rounded-lg bg-primary/50 text-white text-sm font-semibold cursor-not-allowed" data-i18n="ui.runs.create.submit">
                Runを作成
              </button>
              <span class="text-xs text-text-muted" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</span>
            </div>
          </section>

          <div class="mt-6 overflow-x-auto rounded-lg border border-border-dark">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-100 dark:bg-background-dark/70">
                <tr class="text-left text-slate-600 dark:text-slate-300">
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.runId">runId</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.jobType">jobType</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.status">status</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.updated">updated</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.target">target</th>
                </tr>
              </thead>
              <tbody id="runs-table-body"></tbody>
            </table>
          </div>

          <div id="runs-feedback" class="mt-4 text-sm text-text-muted" data-i18n="common.loading">読み込み中</div>
          <button id="runs-retry" class="mt-2 px-3 py-2 rounded-lg border border-border-dark text-sm hover:bg-slate-100 dark:hover:bg-background-dark/80 hidden" type="button" data-i18n="common.retry">
            再試行
          </button>

          <div id="runs-empty-state" class="mt-6 rounded-lg border border-dashed border-border-dark p-6 text-center hidden">
            <p class="text-sm font-semibold" data-i18n="ui.runs.empty.title">Runがまだありません</p>
            <p class="mt-1 text-xs text-text-muted" data-i18n="ui.runs.empty.desc">新規Runを作成するとここに表示されます。</p>
          </div>
        </section>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
    <script src="/ui/i18n/i18n.js" defer></script>
    <script type="module">
      import { apiGet, setText, t } from "/ui/api.js";

      const tbody = document.getElementById("runs-table-body");
      const feedback = document.getElementById("runs-feedback");
      const retry = document.getElementById("runs-retry");
      const empty = document.getElementById("runs-empty-state");
      const createButton = document.getElementById("create-run-button");
      const createPanel = document.getElementById("create-run-panel");

      function toggleEmpty(show) {
        if (!empty) return;
        empty.classList.toggle("hidden", !show);
      }

      function clearRows() {
        if (tbody) tbody.innerHTML = "";
      }

      function buildStatusBadge(status) {
        const value = String(status || "-");
        const badge = document.createElement("span");
        badge.className = "inline-flex px-2 py-1 rounded-full text-xs";
        if (value === "ok" || value === "completed") {
          badge.classList.add("bg-emerald-500/15", "text-emerald-500");
        } else if (value === "running" || value === "pending") {
          badge.classList.add("bg-amber-500/15", "text-amber-500");
        } else {
          badge.classList.add("bg-rose-500/15", "text-rose-500");
        }
        badge.textContent = value;
        return badge;
      }

      function appendRow(run) {
        if (!tbody) return;
        const tr = document.createElement("tr");
        tr.className = "border-t border-border-dark";

        const runId = String(run.run_id || "-");
        const jobType = String(run.job_type || "-");
        const status = String(run.status || "-");
        const updated = String(run.created_at || run.updated_at || "-");
        const target = run.figma_file_key ? String(run.figma_file_key) : "-";

        const tdRun = document.createElement("td");
        tdRun.className = "px-4 py-3 font-mono text-xs";
        const a = document.createElement("a");
        a.href = `/ui/run.html?run_id=${encodeURIComponent(runId)}`;
        a.className = "text-primary hover:underline";
        a.textContent = runId;
        tdRun.appendChild(a);

        const tdJob = document.createElement("td");
        tdJob.className = "px-4 py-3";
        tdJob.textContent = jobType;

        const tdStatus = document.createElement("td");
        tdStatus.className = "px-4 py-3";
        tdStatus.appendChild(buildStatusBadge(status));

        const tdUpdated = document.createElement("td");
        tdUpdated.className = "px-4 py-3";
        tdUpdated.textContent = updated;

        const tdTarget = document.createElement("td");
        tdTarget.className = "px-4 py-3";
        tdTarget.textContent = target;

        tr.append(tdRun, tdJob, tdStatus, tdUpdated, tdTarget);
        tbody.appendChild(tr);
      }

      async function loadRuns() {
        clearRows();
        toggleEmpty(false);
        retry.classList.add("hidden");
        await setText(feedback, "common.loading", true);

        try {
          const payload = await apiGet("/runs");
          const runs = Array.isArray(payload && payload.runs) ? payload.runs : [];
          if (runs.length === 0) {
            feedback.textContent = "";
            toggleEmpty(true);
            return;
          }
          runs.forEach(appendRow);
          feedback.textContent = "";
        } catch (error) {
          const msg = await t("common.error");
          feedback.textContent = `${msg}: ${error && error.message ? error.message : "unknown"}`;
          retry.classList.remove("hidden");
          toggleEmpty(false);
        }
      }

      retry.addEventListener("click", loadRuns);
      createButton.addEventListener("click", () => {
        if (!createPanel) return;
        createPanel.classList.toggle("hidden");
      });
      loadRuns();
    </script>
  </body>
</html>
