<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projects</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
        background: #f4f6fb;
        color: #0f172a;
      }
      header {
        background: #0f172a;
        color: #fff;
        padding: 20px 24px;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 20px;
      }
      .card {
        background: #fff;
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      }
      label {
        display: block;
        margin-bottom: 12px;
      }
      label span {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }
      textarea { min-height: 80px; }
      button {
        border: 0;
        background: #2563eb;
        color: #fff;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .status {
        font-weight: 600;
      }
      .project-list a {
        display: block;
        color: #1d4ed8;
        text-decoration: none;
        margin-bottom: 8px;
      }
      .project-list a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Projects</h1>
      <p>プロジェクト作成後、Drive出力先フォルダを設定してください。</p>
    </header>
    <main>
      <section class="card">
        <h2>新規プロジェクト作成</h2>
        <form id="createForm">
          <label><span>名前</span><input id="nameInput" required /></label>
          <label><span>説明（任意）</span><textarea id="descriptionInput"></textarea></label>
          <label><span>Staging URL</span><input id="stagingInput" type="url" required placeholder="https://example.com" /></label>
          <div class="row">
            <button type="submit">作成して設定へ進む</button>
            <span id="createStatus" class="status" aria-live="polite"></span>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>既存プロジェクト</h2>
        <div id="projectList" class="project-list"></div>
      </section>

      <section class="card">
        <h2>プロジェクト設定</h2>
        <form id="detailForm">
          <label><span>ID</span><input id="idInput" readonly /></label>
          <label><span>Drive出力先フォルダ（IDまたはURL）</span><input id="driveFolderInput" placeholder="https://drive.google.com/drive/folders/..." /></label>
          <div class="row">
            <button type="submit">設定を保存</button>
            <button type="button" id="homeBtn">ホームへ</button>
            <span id="detailStatus" class="status" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>
    <script>
      const createForm = document.getElementById("createForm");
      const detailForm = document.getElementById("detailForm");
      const createStatus = document.getElementById("createStatus");
      const detailStatus = document.getElementById("detailStatus");
      const projectList = document.getElementById("projectList");
      const homeBtn = document.getElementById("homeBtn");

      function pathProjectId() {
        const m = window.location.pathname.match(/^\/projects\/([^/]+)$/);
        return m ? decodeURIComponent(m[1]) : "";
      }

      function setStatus(el, text, ok = true) {
        el.textContent = text;
        el.style.color = ok ? "#059669" : "#b91c1c";
      }

      async function refreshProjects() {
        const res = await fetch("/api/projects");
        const rows = await res.json();
        projectList.innerHTML = "";
        rows.forEach((row) => {
          const a = document.createElement("a");
          a.href = `/projects/${encodeURIComponent(row.id)}`;
          a.textContent = `${row.name} (${row.id})`;
          projectList.appendChild(a);
        });
      }

      async function loadProject(id) {
        if (!id) return;
        const res = await fetch(`/api/projects/${encodeURIComponent(id)}`);
        if (!res.ok) return;
        const row = await res.json();
        document.getElementById("idInput").value = row.id || "";
        document.getElementById("driveFolderInput").value = row.drive_folder_id || "";
      }

      createForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = {
          name: document.getElementById("nameInput").value.trim(),
          description: document.getElementById("descriptionInput").value.trim(),
          staging_url: document.getElementById("stagingInput").value.trim(),
        };
        try {
          const res = await fetch("/api/projects", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.message || body.error || "create failed");
          setStatus(createStatus, "作成しました。設定画面に移動します。", true);
          window.location.href = `/projects/${encodeURIComponent(body.id)}`;
        } catch (error) {
          setStatus(createStatus, error.message, false);
        }
      });

      detailForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const id = document.getElementById("idInput").value.trim() || pathProjectId();
        if (!id) {
          setStatus(detailStatus, "保存対象プロジェクトが未選択です", false);
          return;
        }
        try {
          const res = await fetch(`/api/projects/${encodeURIComponent(id)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ drive_folder_id: document.getElementById("driveFolderInput").value.trim() }),
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.message || body.error || "save failed");
          setStatus(detailStatus, "保存しました。", true);
        } catch (error) {
          setStatus(detailStatus, error.message, false);
        }
      });

      homeBtn.addEventListener("click", () => {
        window.location.href = "/jobs";
      });

      (async () => {
        await refreshProjects();
        await loadProject(pathProjectId());
      })();
    </script>
  </body>
</html>
